<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Boldonse&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <!--burger button-->
      <button class="burger">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="project.html">Projects</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="./todo-list/index.html">Todo List</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Contact Me</h1>
      <p>Feel free to reach out to me!</p>
      <p>Fields marked with an asterisk (<span class="red">*</span>) are required.</p>
      <div id="contact-banner"></div>
      <form id="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name<span class="red">*</span>:</label>
          <input
            type="text"
            id="name"
            name="name"
            value=""
            placeholder="Enter your full name"
            required
          />
          <span class="field-error" id="name-error"></span>
        </div>

        <div class="form-group">
          <label for="email">Email<span class="red">*</span>:</label>
          <input
            type="email"
            id="email"
            name="email"
            value=""
            placeholder="Enter your email address"
            required
          />
          <span class="field-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="message">Message<span class="red">*</span>:</label>
          <textarea
            id="message"
            name="message"
            value=""
            rows="5"
            placeholder="Enter your message"
            maxlength="250"
            required
          ></textarea>
          <span class="field-error" id="message-error"></span>
        </div>

        <button type="submit" class="btn-submit">Send Message</button>
      </form>
    </main>

    <footer class="site-footer">
      <section class="footer-section">
        <h4>About</h4>
        <p>A short bio or tagline about us.</p>
      </section>
      <section class="footer-section">
        <h4>Quick Links</h4>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="project.html">Projects</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </section>
      <section class="footer-section">
        <h4>Contact Info</h4>
        <p>Email: <a href="mailto:example@email.com">example@email.com</a></p>
        <p>Phone: <a href="tel:+11234567890">(123) 456-7890</a></p>
      </section>
    </footer>
  </body>
</html>
